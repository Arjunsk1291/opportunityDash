# Avenir Dashboard — Lightsail nginx config
# Deploy: sudo cp nginx-lightsail.conf /etc/nginx/sites-available/avenirenergy.me
#         sudo ln -sf /etc/nginx/sites-available/avenirenergy.me /etc/nginx/sites-enabled/avenirenergy.me
#         sudo rm -f /etc/nginx/sites-enabled/default   # remove old default if present
#         sudo nginx -t && sudo nginx -s reload

# Rate-limit zone: 60 requests/sec per IP, burst of 120 (allows page loads with many parallel requests)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

server {
    listen 80;
    server_name avin.avenirenergy.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name avin.avenirenergy.me;

    # ── SSL (Certbot manages these) ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/avin.avenirenergy.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avin.avenirenergy.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── SSE endpoint (must come before generic /api/ block) ───────────────────
    location /api/opportunities/stream {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=120 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;

        # Return JSON error when backend is down (not nginx HTML page)
        proxy_intercept_errors off;
    }

    # ── Frontend static files ─────────────────────────────────────────────────
    root /home/ubuntu/opportunityDash/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Immutable hashed assets get long cache
    location ~* \.(js|css|woff2?|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check bypass (no rate limit)
    location = /api/health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
