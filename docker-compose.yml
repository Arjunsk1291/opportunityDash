services:
  mongo:
    image: mongo:7
    container_name: opportunitydash-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: opportunitydash-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/opportunity-dashboard
    depends_on:
      - mongo
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: opportunitydash-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
